<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inmobiliaria Pedrosa | Gestión Inmobiliaria</title>
    <style>
        /* --- ESTILOS BASE --- */
        :root { --accent: #8b7355; --text: #333; --bg: #fdfcfb; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        header { padding: 2rem; text-align: center; background: white; border-bottom: 1px solid #eee; }
        
        /* FILTROS */
        .filters { display: flex; justify-content: center; gap: 1rem; padding: 2rem; }
        .pf { padding: 0.8rem 1.5rem; border: 1px solid var(--accent); background: none; cursor: pointer; transition: 0.3s; }
        .pf.active { background: var(--accent); color: white; }

        /* REJILLA DE PROPIEDADES */
        .props-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; padding: 0 2rem; max-width: 1200px; margin: 0 auto; }
        .prop-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; }
        .prop-card:hover { transform: translateY(-5px); }
        .prop-img { height: 200px; background: #eee; position: relative; overflow: hidden; }
        .prop-img img { width: 100%; height: 100%; object-fit: cover; }
        .prop-tag { position: absolute; top: 10px; left: 10px; padding: 0.3rem 0.8rem; background: var(--accent); color: white; font-size: 0.8rem; border-radius: 4px; text-transform: uppercase; }
        .prop-info { padding: 1.5rem; }
        .prop-price { font-size: 1.5rem; font-weight: bold; color: var(--accent); margin-bottom: 0.5rem; }
        .prop-name { font-weight: 600; margin-bottom: 0.3rem; }
        .prop-ref { font-size: 0.8rem; color: #888; margin-top: 1rem; border-top: 1px solid #eee; padding-top: 0.5rem; }
        
        #prop-counter { text-align: center; padding: 1rem; font-style: italic; color: #666; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>INMOBILIARIA PEDROSA</h1>
    <p>Plaza de la Peregrina 6, Pontevedra</p>
</header>

<div class="filters">
    <button class="pf active" onclick="setFilter('venta', this)">VENTA</button>
    <button class="pf" onclick="setFilter('alquiler', this)">ALQUILER</button>
</div>

<div id="prop-counter">Cargando propiedades...</div>

<div class="props-grid" id="props-grid">
    </div>

<script>
// --- CONFIGURACIÓN TÉCNICA ---
const CONFIG = {
    token: '5430_244_ext',
    imgBase: 'https://fotos15.apinmo.com/',
    // v=Date.now() evita que Vercel use datos viejos de la caché
    apiUrl: `https://apiweb.inmovilla.com/v1/propiedades?token=5430_244_ext&v=${Date.now()}`
};

let allProperties = [];
let currentFilter = 'venta';

// 1. CARGAR DATOS DEL CRM
async function init() {
    try {
        const response = await fetch(CONFIG.apiUrl);
        const data = await response.json();

        if (data.error === "NECESITAMOS RECIBIR LA IP") {
            document.getElementById('prop-counter').innerHTML = 
                "<b style='color:red;'>Error de Conexión:</b> Inmovilla aún no ha autorizado las IPs del proxy Fixie.";
            return;
        }

        allProperties = data.encontrados || [];
        render();
    } catch (error) {
        console.error("Error en la carga:", error);
        document.getElementById('prop-counter').innerText = "Error al conectar con el servidor.";
    }
}

// 2. FILTRAR Y DIBUJAR
function setFilter(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.pf').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function render() {
    const grid = document.getElementById('props-grid');
    const filtered = allProperties.filter(p => 
        p.operacion.toLowerCase().includes(currentFilter.toLowerCase())
    );

    document.getElementById('prop-counter').innerText = `${filtered.length} propiedades encontradas en ${currentFilter.toUpperCase()}`;

    grid.innerHTML = filtered.map(p => {
        // Corrección de fotos: Inmovilla a veces envía solo el nombre del archivo
        const fotoRaw = (p.fotos && p.fotos.length > 0) ? p.fotos[0] : '';
        const fotoUrl = fotoRaw.startsWith('http') ? fotoRaw : CONFIG.imgBase + fotoRaw;
        const fotoFinal = fotoRaw ? fotoUrl : 'https://via.placeholder.com/400x300?text=Sin+Foto';

        return `
            <div class="prop-card">
                <div class="prop-img">
                    <img src="${fotoFinal}" alt="${p.tipo}" onerror="this.src='https://via.placeholder.com/400x300?text=Imagen+no+disponible'">
                    <div class="prop-tag">${p.operacion}</div>
                </div>
                <div class="prop-info">
                    <div class="prop-price">${new Intl.NumberFormat('es-ES').format(p.precio)} €</div>
                    <div class="prop-name">${p.tipo} en ${p.poblacion}</div>
                    <div class="prop-loc">${p.zona || ''}</div>
                    <div class="prop-ref">Referencia: ${p.referencia}</div>
                </div>
            </div>
        `;
    }).join('');
}

// Arrancar
init();
</script>

</body>
</html>
